root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/main api"
cmd = "CGO_ENABLED=0 go build -o ./tmp/main ./cmd"
include_dir = []
include_ext = ["go", "tpl", "tmpl","templ", "html","scss","js"]
include_file = []
exclude_dir = ["dist", "data", "bin", ".git", "tmp", "vendor"]
exclude_file = []
exclude_regex = ["_test.go", ".*tmp"]
exclude_unchanged = true
follow_symlink = false
full_bin = ""
kill_delay = "500ms"
log = "build-errors.log"
poll = false
poll_interval = 0
post_cmd = []
pre_cmd = []
delay = 1000
rerun = false
rerun_delay = 500
send_interrupt = true
stop_on_error = false

[color]
app = ""
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = false
keep_scroll = true
